<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=460">
<title>Живые стримы</title>
<style>
  body {
    font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
    font-size: 14px;
    margin: 8px;
  }
  pre { margin: 13px 0; white-space: pre; }
  body { background: #000; }
  body, a, a:visited { color: #d9d9d9; }
  body.light { background: #fff; }
  body.light, body.light a, body.light a:visited { color: #000; }
  .theme-toggle {
    position: fixed; top: 4px; right: 8px;
    font: inherit; color: inherit;
    text-decoration: none; cursor: pointer;
  }
</style>
</head>
<body><a class="theme-toggle" href="#" onclick="return toggleTheme()">[o]</a><pre>
╔══════════════╗
║ Живые стримы ║
╚══════════════╝


Еженедельный стрим от меня, стримы гостей,
сессии Q&amp;A от меня и специалистов по тематике
курсов и не только.
</pre><script>
if (localStorage.theme === 'light') document.body.classList.add('light');
function toggleTheme() {
  var l = document.body.classList.toggle('light');
  localStorage.theme = l ? 'light' : 'dark';
  return false;
}
</script></body>
</html>
